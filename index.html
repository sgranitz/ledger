<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500&family=Victor+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Diesel Rudolf';
  src: url('../branding/Diesel-Rudolf_reduced.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}
:root {
  --bg:        #1a1612;
  --bg2:       #221e19;
  --card:      #2a2420;
  --card2:     #322c26;
  --border:    rgba(200,169,110,0.13);
  --border2:   rgba(200,169,110,0.25);
  --amber:     #c8a96e;
  --amber-dim: #9a7e4f;
  --amber-bg:  rgba(200,169,110,0.08);
  --cream:     #e8e0d4;
  --muted:     #8a8070;
  --faint:     #5a5040;
  --red:       #c87060;
  --blue:      #6090b0;
  --green:     #70a880;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  padding: 24px 16px 60px;
  max-width: 760px;
  margin: 0 auto;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.header-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.back-link {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  opacity: 0.7;
}
.back-link:hover { color: var(--amber); opacity: 1; }

.wordmark {
  font-family: 'Diesel Rudolf', serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--cream);
}
.wordmark em { color: var(--amber); }

.vault-status {
  display: flex;
  align-items: center;
}

.identity-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 10px 5px 8px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.identity-pill.connected { border-color: var(--amber-mid); }

.pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--faint);
  flex-shrink: 0;
  transition: background 0.3s;
}
.pill-dot.on { background: var(--green); }

.pill-label {
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-transform: none;
  letter-spacing: 0.04em;
}

.btn-sm {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: 'Victor Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-sm:hover { border-color: var(--amber); color: var(--amber); }

/* ── MAIN NAV ── */
.main-nav {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
}

.nav-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Victor Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn.active {
  background: var(--card2);
  color: var(--cream);
  border: 1px solid var(--border2);
}

/* ── SUB TABS ── */
.sub-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px;
  margin-bottom: 18px;
}

.sub-tab {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Victor Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.sub-tab.active {
  background: var(--card);
  color: var(--cream);
  border: 1px solid var(--border);
}


/* ── SECTION CARD ── */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

/* ── INPUTS ── */
.field { margin-bottom: 14px; }

.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px dashed var(--border2);
  border-radius: 5px;
  color: var(--cream);
  font-family: 'Victor Mono', monospace;
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus,
.field select:focus,
.field textarea:focus { border-color: var(--amber); border-style: solid; }
.field select option { background: var(--card2); }
.field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── SEARCH BTN ── */
.btn-search {
  width: 100%;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'Victor Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.btn-search:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); border-style: solid; }
.btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── RESULTS GRID ── */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.result-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.result-card:hover { border-color: var(--amber-dim); transform: translateY(-1px); }
.result-card.selected { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }

.result-cover {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; display: block;
  background: var(--card2);
}
.result-cover-placeholder {
  width: 100%; aspect-ratio: 1;
  background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--faint);
}
.result-info { padding: 8px; }
.result-title {
  font-size: 10px; color: var(--cream); line-height: 1.3; margin-bottom: 3px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.result-sub { font-size: 9px; color: var(--muted); }

/* ── CONFIRM ── */
.confirm-section {
  background: var(--card);
  border: 1px solid var(--amber-dim);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}

.confirm-header {
  display: flex; gap: 14px; align-items: flex-start;
  margin-bottom: 18px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.confirm-cover {
  width: 72px; height: 72px; object-fit: cover;
  border-radius: 4px; background: var(--card2); flex-shrink: 0;
}
.confirm-cover-placeholder {
  width: 72px; height: 72px; background: var(--card2);
  border-radius: 4px; display: flex; align-items: center;
  justify-content: center; font-size: 28px; flex-shrink: 0;
}
.confirm-meta { flex: 1; min-width: 0; }
.confirm-title {
  font-family: 'Crimson Text', serif;
  font-size: 16px; color: var(--cream); margin-bottom: 4px; line-height: 1.3;
}
.confirm-sub { font-size: 11px; color: var(--muted); }
.confirm-tag {
  display: inline-block;
  background: var(--amber-bg); border: 1px solid var(--amber-dim);
  color: var(--amber); font-size: 9px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-top: 6px;
}

/* ── STARS ── */
.rating-row { display: flex; gap: 6px; align-items: center; }
.star { font-size: 18px; cursor: pointer; color: var(--faint); transition: color 0.15s; user-select: none; }
.star.lit { color: var(--amber); }

/* ── SAVE BTN ── */
.btn-save {
  width: 100%; background: var(--amber); border: none;
  border-radius: 7px; color: #1a1612;
  font-family: 'Victor Mono', monospace; font-size: 12px;
  font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 16px; cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.btn-save:hover:not(:disabled) { background: #d4b87e; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  width: 100%; background: transparent;
  border: 1px solid var(--border2); border-radius: 7px;
  color: var(--muted); font-family: 'Victor Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 13px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-secondary:hover { color: var(--cream); }

/* ── BROWSE ── */
.browse-controls {
  margin-bottom: 10px;
}

.browse-search {
  width: 100%; box-sizing: border-box;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--cream);
  font-family: 'Victor Mono', monospace; font-size: 12px;
  padding: 9px 12px; outline: none;
}
.browse-search:focus { border-color: var(--amber); }

.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 14px;
}
.filter-select {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted);
  font-family: 'Victor Mono', monospace; font-size: 11px;
  letter-spacing: 0.06em; padding: 7px 10px; cursor: pointer;
  outline: none; flex: 1; min-width: 120px;
}
.filter-select:focus { border-color: var(--amber); }
.filter-select option { background: var(--card2); }
.filter-select.active { border-color: var(--amber); color: var(--amber); }

.collection-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.fav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 12px;
  margin-top: 10px;
}
.fav-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 5px;
}
.fav-cover {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.fav-cover-placeholder {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  opacity: 0.4;
}
.fav-title {
  font-size: 11px;
  color: var(--text1);
  line-height: 1.3;
  max-height: 2.6em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.fav-sub {
  font-size: 10px;
  color: var(--faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
}
.fav-rating {
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 1px;
}

.coll-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: all 0.2s;
  cursor: default;
}
.coll-card:hover { border-color: var(--border2); transform: translateY(-2px); }

.coll-cover {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; display: block; background: var(--card2);
}
.coll-cover-placeholder {
  width: 100%; aspect-ratio: 1;
  background: var(--card2); display: flex;
  align-items: center; justify-content: center;
  font-size: 32px; color: var(--faint);
}
.coll-info { padding: 10px; }
.coll-title {
  font-size: 11px; color: var(--cream); line-height: 1.3;
  margin-bottom: 4px; font-weight: 500;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.coll-sub { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
.coll-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.coll-tag {
  font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 5px; border-radius: 2px; border: 1px solid var(--border2);
  color: var(--faint);
}
.coll-tag.amber { border-color: var(--amber-dim); color: var(--amber-dim); }

.browse-empty {
  grid-column: 1/-1; text-align: center;
  padding: 48px 0; color: var(--faint);
  font-size: 11px; letter-spacing: 0.08em;
}

.browse-count {
  font-size: 10px; color: var(--faint);
  letter-spacing: 0.08em; margin-bottom: 14px;
  text-transform: uppercase;
}

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
}
.stat-card.full { grid-column: 1 / -1; }

.stat-label {
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
}

.stat-number {
  font-family: 'Crimson Text', serif;
  font-size: 36px; color: var(--amber); line-height: 1;
  margin-bottom: 4px;
}
.stat-sublabel { font-size: 10px; color: var(--faint); letter-spacing: 0.06em; }

/* Bar chart */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { font-size: 10px; color: var(--muted); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.6s ease; }
.bar-fill.blue { background: var(--blue); }
.bar-fill.green { background: var(--green); }
.bar-count { font-size: 10px; color: var(--faint); width: 24px; text-align: right; flex-shrink: 0; }

/* Donut chart */
.donut-wrap {
  display: flex; align-items: center; gap: 20px;
}
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── LOADING / TOAST ── */
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid var(--border2); border-top-color: var(--amber);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-row {
  display: flex; align-items: center; justify-content: center;
  padding: 24px; color: var(--muted); font-size: 11px; letter-spacing: 0.08em;
}

.hint { text-align: center; color: var(--faint); font-size: 11px; letter-spacing: 0.06em; padding: 20px 0 4px; }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 12px 20px;
  font-size: 11px; letter-spacing: 0.06em; color: var(--cream);
  transition: transform 0.3s ease; z-index: 100; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

/* ── RECENT ── */
.recent-label {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--faint); margin-bottom: 12px; margin-top: 8px;
}
.recent-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.recent-item:last-child { border-bottom: none; }
.recent-cover { width: 36px; height: 36px; border-radius: 3px; object-fit: cover; background: var(--card2); flex-shrink: 0; }
.recent-title { font-size: 12px; color: var(--cream); }
.recent-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.badge {
  margin-left: auto; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); background: var(--bg2); border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
}

.tool-footer {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  margin-top: 64px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  opacity: 0.45;
}
.tool-footer span {
  font-family: 'Victor Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.seam {
  width: 100%;
  height: 20px;
  margin: 10px 0;
  display: block;
}

@media (max-width: 560px) {
  body { padding: 16px 12px 48px; }
  .header { gap: 8px; }
  .nav-btn { font-size: 10px; padding: 8px 6px; letter-spacing: 0.08em; }
  .field-row { grid-template-columns: 1fr; }
  .pill-label { max-width: 100px; }
  .section { padding: 14px; }
}
</style>
</head>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <a class="back-link" href="https://www.stoult.com/workshop/">← return to the workshop</a>
    <div class="wordmark">the <em>ledger</em></div>
  </div>
  <div class="vault-status">
    <div id="vaultOut">
      <button class="btn-sm" id="btnConnect">connect vault</button>
    </div>
    <div class="identity-pill" id="vaultIn" style="display:none">
      <div class="pill-dot" id="pillDot"></div>
      <span class="pill-label" id="vaultName">—</span>
      <button class="btn-sm" onclick="disconnectVault()">change</button>
    </div>
  </div>
</header>

<svg class="seam" viewBox="0 0 900 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0 14 Q280 8 500 13 Q720 18 900 9" fill="none" stroke="var(--amber)" stroke-width="1" opacity="0.35"/>
</svg>

<!-- MAIN NAV -->
<nav class="main-nav">
  <button class="nav-btn active" id="navAdd" onclick="switchNav('add')">add</button>
  <button class="nav-btn" id="navBrowse" onclick="switchNav('browse')">browse</button>
  <button class="nav-btn" id="navStats" onclick="switchNav('stats')">stats</button>
</nav>

<!-- ════════════════ ADD PANEL ════════════════ -->
<div id="panelAdd">
  <div class="sub-tabs">
    <button class="sub-tab active" id="addTabVinyl" onclick="switchAddTab('vinyl')">⬤ vinyl</button>
    <button class="sub-tab" id="addTabBooks" onclick="switchAddTab('books')">⬤ books</button>
  </div>

  <!-- VINYL ADD -->
  <div id="addVinyl">
    <div class="section">
      <div class="section-label">search discogs</div>
      <div class="field"><label>Artist</label><input type="text" id="vArtist" placeholder="e.g. Kendrick Lamar" /></div>
      <div class="field"><label>Album Title</label><input type="text" id="vTitle" placeholder="e.g. GNX" /></div>
      <div class="field"><label>Vinyl Color</label><input type="text" id="vColor" placeholder="e.g. Black, Translucent Green" /></div>
      <button class="btn-search" id="vSearchBtn" onclick="searchVinyl()">+ search discogs</button>
    </div>
    <div id="vResults"></div>
    <div id="vConfirm"></div>
  </div>

  <!-- BOOKS ADD -->
  <div id="addBooks" style="display:none">
    <div class="section">
      <div class="section-label">search open library</div>
      <div class="field"><label>Author</label><input type="text" id="bAuthor" placeholder="e.g. Cormac McCarthy" /></div>
      <div class="field"><label>Title</label><input type="text" id="bTitle" placeholder="e.g. Blood Meridian" /></div>
      <button class="btn-search" id="bSearchBtn" onclick="searchBooks()">+ search open library</button>
    </div>
    <div id="bResults"></div>
    <div id="bConfirm"></div>
  </div>

  <!-- RECENT -->
  <div id="recentSection" style="display:none">
    <div class="recent-label">recent entries</div>
    <div id="recentList"></div>
  </div>
</div>

<!-- ════════════════ BROWSE PANEL ════════════════ -->
<div id="panelBrowse" style="display:none">
  <div class="sub-tabs">
    <button class="sub-tab active" id="browseTabVinyl" onclick="switchBrowseTab('vinyl')">⬤ vinyl</button>
    <button class="sub-tab" id="browseTabBooks" onclick="switchBrowseTab('books')">⬤ books</button>
  </div>

  <div class="browse-controls">
    <input class="browse-search" id="browseSearch" type="text" placeholder="search by title or artist..." oninput="debouncedSearch()">
  </div>

  <div class="filter-bar" id="filterBar"></div>

  <div class="browse-count" id="browseCount"></div>
  <div class="collection-grid" id="collectionGrid">
    <div class="browse-empty">connect your vault to browse</div>
  </div>
</div>

<!-- ════════════════ STATS PANEL ════════════════ -->
<div id="panelStats" style="display:none">
  <div class="sub-tabs">
    <button class="sub-tab active" id="statsTabVinyl" onclick="switchStatsTab('vinyl')">⬤ vinyl</button>
    <button class="sub-tab" id="statsTabBooks" onclick="switchStatsTab('books')">⬤ books</button>
  </div>
  <div id="statsContent">
    <div class="stat-card"><div class="loading-row">connect your vault to see stats</div></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
const DISCOGS_TOKEN = 'jQZNIsPjJlcRZeemYAWWIXEDIidYNIbvjrpbJhsw';
let vaultHandle = null;
let selectedVinyl = null;
let selectedBook = null;
let vinylRating = 0;
let bookRating = 0;
let recentEntries = JSON.parse(localStorage.getItem('ledger_recent') || '[]');

// Collection caches
let vinylCollection = [];
let booksCollection = [];
let currentBrowseType = 'vinyl';
let currentStatsType = 'vinyl';
let currentAddTab = 'vinyl';
let activeFilters = {}; // { genre: 'Hip Hop', color: 'Red', ... }

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
renderRecent();
updateVaultUI(); // always reset to disconnected state on load

document.getElementById('btnConnect').addEventListener('click', connectVault);
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const nav = document.querySelector('.nav-btn.active')?.id;
  if (nav === 'navAdd') {
    if (currentAddTab === 'vinyl' && !document.getElementById('vConfirm').innerHTML) searchVinyl();
    if (currentAddTab === 'books' && !document.getElementById('bConfirm').innerHTML) searchBooks();
  }
});

// ════════════════════════════════════════════
// VAULT
// ════════════════════════════════════════════
async function connectVault() {
  try {
    vaultHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    updateVaultUI();
    showToast('vault connected — building index...', 'success');
    await loadCollections();
    showToast(`indexed ${vinylIndex.length} records · ${booksIndex.length} books`, 'success');
    const activeNav = document.querySelector('.nav-btn.active')?.id;
    if (activeNav === 'navBrowse') renderBrowse();
    if (activeNav === 'navStats') renderStats();
  } catch(e) {
    if (e.name !== 'AbortError') showToast('could not connect vault', 'error');
  }
}

function disconnectVault() {
  vaultHandle = null;
  vinylCollection = [];
  booksCollection = [];
  browseCache = { vinyl: null, books: null };
  updateVaultUI();
}

function updateVaultUI() {
  if (vaultHandle) {
    document.getElementById('vaultOut').style.display = 'none';
    const pill = document.getElementById('vaultIn');
    pill.style.display = 'flex';
    pill.classList.add('connected');
    document.getElementById('pillDot').classList.add('on');
    document.getElementById('vaultName').textContent = vaultHandle.name;
  } else {
    document.getElementById('vaultOut').style.display = '';
    const pill = document.getElementById('vaultIn');
    pill.style.display = 'none';
    pill.classList.remove('connected');
    document.getElementById('pillDot').classList.remove('on');
  }
}

async function getOrCreateFolder(parentHandle, name) {
  return await parentHandle.getDirectoryHandle(name, { create: true });
}

async function writeFile(folderHandle, filename, content) {
  const fh = await folderHandle.getFileHandle(filename, { create: true });
  const w = await fh.createWritable();
  await w.write(content);
  await w.close();
}

// ════════════════════════════════════════════
// COLLECTION — search-driven, no upfront indexing
// ════════════════════════════════════════════
let vinylDirHandle = null;
let booksDirHandle = null;
let searchDebounce = null;

// Filename-only indexes built on connect (no file reads, fast)
// Maps artist/author name (lowercase) → Set of album/book filenames that belong to them
// Built by reading frontmatter of each vinyl/book file once per session... 
// Actually: we use the Wikilinks in the filename index approach:
// vinyl files are named after albums. Musicians/ stubs are named after artists.
// We build: artistName → [album filenames] by reading each vinyl file's artist field.
// But that's slow. Instead: store handle maps and search both title AND content lazily.

// Simple approach: index is just { name (display), filename } for quick filename match
// For artist search, we read the file only if filename doesn't match but we need content match
// → On connect, build a lightweight map: album filename → artist name string
//   by reading ONLY the artist: line from each file (first ~5 lines, not full parse)
let vinylIndex = []; // [{ filename, artist }]
let booksIndex = []; // [{ filename, author }]

async function loadCollections() {
  if (!vaultHandle) return;
  try {
    const refs = await vaultHandle.getDirectoryHandle('References', { create: false });
    try { vinylDirHandle = await refs.getDirectoryHandle('Vinyl', { create: false }); } catch(e) { vinylDirHandle = null; }
    try { booksDirHandle = await refs.getDirectoryHandle('Books', { create: false }); } catch(e) { booksDirHandle = null; }

    // Build lightweight index: read only first ~300 chars of each file to get artist/author
    vinylIndex = await buildIndex(vinylDirHandle, 'artist');
    booksIndex = await buildIndex(booksDirHandle, 'author');

    vinylCollection = [];
    booksCollection = [];
    browseCache = { vinyl: null, books: null };
    renderBrowse();
    renderStats();
  } catch(e) { /* no References folder yet */ }
}

async function buildIndex(dirHandle, field) {
  if (!dirHandle) return [];
  const index = [];
  const MAX_BYTES = 400; // only read start of file for artist/author field

  const handles = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'file' && name.endsWith('.md')) handles.push({ name, handle });
  }

  // Read just the first 400 bytes of each file in parallel batches
  const BATCH = 80;
  for (let i = 0; i < handles.length; i += BATCH) {
    const batch = handles.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async ({ name, handle }) => {
      try {
        const file = await handle.getFile();
        const slice = file.slice(0, MAX_BYTES);
        const text = await slice.text();
        const fieldVal = extractField(text, field);
        return { filename: name, [field]: (fieldVal || '').toLowerCase() };
      } catch(e) { return { filename: name, [field]: '' }; }
    }));
    results.forEach(r => index.push(r));
  }
  return index;
}

// Extract a single YAML field value from partial file text (handles wikilinks like [[Name]])
function extractField(text, field) {
  text = text.replace(/\r\n/g, '\n');
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Inline: "artist: Some Value"
    const inlineMatch = line.match(new RegExp(`^${field}:\\s*(.+)$`));
    if (inlineMatch) {
      return inlineMatch[1].replace(/\[\[|\]\]|"|'/g, '').trim();
    }
    // List field: "artist:" followed by "  - [[Value]]" on next line
    if (line.match(new RegExp(`^${field}:\\s*$`)) && lines[i+1]?.match(/^\s+-/)) {
      const listVal = lines[i+1].replace(/^\s+-\s*/, '').replace(/\[\[|\]\]|"|'/g, '').trim();
      return listVal;
    }
  }
  return '';
}

function parseRating(val) {
  if (!val) return 0;
  const s = String(val).trim();
  // Numeric string
  const n = parseInt(s);
  if (!isNaN(n)) return n;
  // Emoji stars: count ⭐ characters
  return [...s].filter(c => c === '⭐' || c === '★').length;
}

function parseFrontmatter(text) {
  // Normalize line endings (Windows CRLF → LF)
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const match = text.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return null;
  const yaml = match[1];
  const result = {};

  // Simple YAML parser for our known fields
  const lines = yaml.split('\n');
  let currentKey = null;
  let inList = false;

  for (const line of lines) {
    const listMatch = line.match(/^  - (.+)$/);
    const keyMatch = line.match(/^(\w+):\s*(.*)$/);

    if (listMatch && inList) {
      const val = listMatch[1].replace(/^"(.*)"$/, '$1').replace(/\[\[.*?\|(.*?)\]\]/, '$1').replace(/\[\[(.*?)\]\]/, '$1');
      if (!result[currentKey]) result[currentKey] = [];
      result[currentKey].push(val);
    } else if (keyMatch) {
      currentKey = keyMatch[1];
      const raw = keyMatch[2].trim();
      const val = raw.replace(/^"(.*)"$/, '$1').replace(/\[\[.*?\|(.*?)\]\]/, '$1').replace(/\[\[(.*?)\]\]/, '$1');
      if (raw === '' || raw === 'null') {
        result[currentKey] = null;
        inList = true;  // next lines may be list items
      } else {
        result[currentKey] = val;
        inList = false;
      }
    } else if (line.trim() === '' || (line.length > 0 && !line.startsWith(' '))) {
      // Non-list, non-key line resets inList
      inList = false;
    }
  }

  // Extract cover image from body
  const coverMatch = text.match(/!\[.*?\]\((https?:\/\/[^\)]+)\)/);
  if (coverMatch) result._cover = coverMatch[1];

  return result;
}

// Full parsed collection cache for browse (loaded on demand)

function renderBrowse() {

function debouncedSearch() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => filterCollection(), 300);
}

function setFilter(key, value) {
  if (value === '') {
    delete activeFilters[key];
  } else {
    activeFilters[key] = value;
  }
  renderFilterBar();
  renderGrid();
}

function renderFilterBar() {
  const isVinyl = currentBrowseType === 'vinyl';
  const collection = isVinyl ? browseCache.vinyl : browseCache.books;
  const bar = document.getElementById('filterBar');
  if (!collection || collection.length === 0) { bar.innerHTML = ''; return; }

  const groups = isVinyl
    ? [
        { key: 'genre', label: 'all genres' },
        { key: 'color', label: 'all colors' },
        { key: 'year', label: 'all decades', decade: true },
      ]
    : [
        { key: 'status', label: 'all statuses' },
        { key: 'genre', label: 'all genres' },
      ];

  // Helper: filter collection by all active filters EXCEPT one key
  function collectionWithout(excludeKey) {
    return collection.filter(item => {
      for (const [key, value] of Object.entries(activeFilters)) {
        if (key === excludeKey) continue;
        if (key === 'year') {
          const y = parseInt(item.year);
          const decade = y ? Math.floor(y/10)*10+'s' : null;
          if (decade !== value) return false;
        } else {
          const v = item[key];
          const vals = Array.isArray(v) ? v : (v ? [v] : []);
          if (!vals.includes(value)) return false;
        }
      }
      return true;
    });
  }

  let html = '';
  for (const group of groups) {
    // Count against collection filtered by all OTHER active filters
    const basis = collectionWithout(group.key);
    const valueCounts = {};
    basis.forEach(item => {
      if (group.decade) {
        const y = parseInt(item.year);
        if (y) { const d = Math.floor(y/10)*10+'s'; valueCounts[d] = (valueCounts[d]||0)+1; }
      } else {
        const v = item[group.key];
        const vals = Array.isArray(v) ? v : (v ? [v] : []);
        vals.forEach(x => { if (x) valueCounts[x] = (valueCounts[x]||0)+1; });
      }
    });

    let sorted = Object.entries(valueCounts).sort((a,b) => b[1]-a[1]);
    if (group.decade) sorted = sorted.sort((a,b) => parseInt(a[0])-parseInt(b[0]));
    if (sorted.length === 0) continue;

    const active = activeFilters[group.key] || '';
    html += `<select class="filter-select ${active ? 'active' : ''}"
      onchange="setFilter('${group.key}', this.value)">
      <option value="">${group.label}</option>
      ${sorted.map(([v, n]) => `<option value="${v.replace(/"/g,'&quot;')}" ${active===v?'selected':''}>${v} (${n})</option>`).join('')}
    </select>`;
  }

  bar.innerHTML = html;
}

function renderGrid() {
  const isVinyl = currentBrowseType === 'vinyl';
  const collection = isVinyl ? browseCache.vinyl : browseCache.books;
  const grid = document.getElementById('collectionGrid');
  const countEl = document.getElementById('browseCount');
  const q = document.getElementById('browseSearch').value.trim().toLowerCase();

  if (!collection) return;

  let items = collection;

  // Text search
  if (q) {
    const field = isVinyl ? 'artist' : 'author';
    items = items.filter(item => {
      const title = (item.title || item.filename || '').toLowerCase();
      const person = Array.isArray(item[field])
        ? item[field].join(' ').toLowerCase()
        : (item[field] || '').toLowerCase();
      return title.includes(q) || person.includes(q);
    });
  }

  // Chip filters
  for (const [key, value] of Object.entries(activeFilters)) {
    items = items.filter(item => {
      if (key === 'year') {
        const y = parseInt(item.year);
        const decade = y ? Math.floor(y / 10) * 10 + 's' : null;
        return decade === value;
      }
      const v = item[key];
      const vals = Array.isArray(v) ? v : (v ? [v] : []);
      return vals.includes(value);
    });
  }

  const label = isVinyl ? 'records' : 'books';
  countEl.textContent = `${items.length} of ${collection.length} ${label}`;

  if (items.length === 0) {
    grid.innerHTML = `<div class="browse-empty">no results</div>`;
    return;
  }

  grid.innerHTML = items.map(item => isVinyl ? renderVinylCard(item) : renderBookCard(item)).join('');
}

async function filterCollection() {
  const isVinyl = currentBrowseType === 'vinyl';
  const dirHandle = isVinyl ? vinylDirHandle : booksDirHandle;
  const cacheKey = isVinyl ? 'vinyl' : 'books';
  const grid = document.getElementById('collectionGrid');
  const countEl = document.getElementById('browseCount');
  const label = isVinyl ? 'records' : 'books';

  if (!vaultHandle) {
    countEl.textContent = '';
    document.getElementById('filterBar').innerHTML = '';
    grid.innerHTML = `<div class="browse-empty">
      <div style="margin-bottom:12px">connect your vault to browse</div>
      <button class="btn-sm" onclick="connectVault()" style="font-size:11px;padding:7px 14px">connect vault</button>
    </div>`;
    return;
  }

  if (!dirHandle) {
    countEl.textContent = '';
    grid.innerHTML = `<div class="browse-empty">no ${label} folder found in vault</div>`;
    return;
  }

  // Load full collection into cache if not yet done
  if (!browseCache[cacheKey]) {
    grid.innerHTML = `<div class="browse-empty"><span class="spinner"></span> loading ${label}...</div>`;
    countEl.textContent = '';
    browseCache[cacheKey] = await readAllMdFiles(dirHandle);
  }

  renderFilterBar();
  renderGrid();
}

async function renderStats() {
  const el = document.getElementById('statsContent');
  if (!vaultHandle) {
    el.innerHTML = '<div class="stat-card"><div class="loading-row">connect your vault to see stats</div></div>';
    return;
  }

  // Load full collections if not yet cached
  if (vinylCollection.length === 0 && vinylDirHandle) {
    el.innerHTML = '<div class="stat-card"><div class="loading-row"><span class="spinner"></span> loading collection for stats...</div></div>';
    vinylCollection = await readAllMdFiles(vinylDirHandle);
  }
  if (booksCollection.length === 0 && booksDirHandle) {
    booksCollection = await readAllMdFiles(booksDirHandle);
  }

  if (currentStatsType === 'vinyl') {
    el.innerHTML = renderVinylStats();
  } else {
    el.innerHTML = renderBookStats();
  }
}

async function readAllMdFiles(dirHandle) {
  if (!dirHandle) return [];
  const handles = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'file' && name.endsWith('.md')) handles.push({ name, handle });
  }
  const BATCH = 80;
  const items = [];
  for (let i = 0; i < handles.length; i += BATCH) {
    const batch = handles.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async ({ name, handle }) => {
      try {
        const file = await handle.getFile();
        const text = await file.text();
        const fm = parseFrontmatter(text);
        return fm ? { filename: name, ...fm } : null;
      } catch(e) { return null; }
    }));
    results.forEach(r => r && items.push(r));
  }
  return items;
}

async function searchVinyl() {
  const artist = document.getElementById('vArtist').value.trim();
  const title = document.getElementById('vTitle').value.trim();
  if (!artist || !title) { showToast('enter artist and title', 'error'); return; }

  const btn = document.getElementById('vSearchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>searching...';
  document.getElementById('vResults').innerHTML = '';
  document.getElementById('vConfirm').innerHTML = '';
  selectedVinyl = null;

  try {
    const url = `https://api.discogs.com/database/search?release_title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}&type=release&format=vinyl&token=${DISCOGS_TOKEN}&per_page=6`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.results || data.results.length === 0) {
      document.getElementById('vResults').innerHTML = '<p class="hint">no results — try adjusting the search</p>';
    } else {

  } catch(e) { showToast('discogs search failed', 'error'); }

  btn.disabled = false;
  btn.textContent = '+ search discogs';
}

}

async function selectVinyl(index) {
  document.querySelectorAll('[id^="vr-"]').forEach(el => el.classList.remove('selected'));
  document.getElementById(`vr-${index}`).classList.add('selected');
  const result = window._vinylResults[index];
  document.getElementById('vConfirm').innerHTML = '<div class="loading-row"><span class="spinner"></span>loading release data...</div>';
  try {
    const res = await fetch(`https://api.discogs.com/releases/${result.id}?token=${DISCOGS_TOKEN}`);
    const data = await res.json();
    selectedVinyl = data;
    renderVinylConfirm(data);
  } catch(e) {
    selectedVinyl = { _fallback: true, _result: result };
    renderVinylConfirm(null, result);
  }
}

function renderVinylConfirm(data, fallback) {
  const title = data ? data.title : (fallback ? fallback.title.split(' - ').slice(1).join(' - ') : '');
  const artists = data?.artists ? data.artists.map(a => a.name.replace(/\s\(\d+\)$/, '')).join(', ') : document.getElementById('vArtist').value;
  const year = data?.year || fallback?.year || '—';
  const cover = data?.images?.[0]?.uri || fallback?.cover_image || '';
  const genres = data?.genres?.join(', ') || '';
  const color = document.getElementById('vColor').value.trim();
  vinylRating = 0;

  document.getElementById('vConfirm').innerHTML = `
    <div class="confirm-section">
      <div class="section-label">confirm & save</div>
      <div class="confirm-header">
        ${cover && !cover.includes('spacer') ? `<img class="confirm-cover" src="${cover}" alt="">` : `<div class="confirm-cover-placeholder">♪</div>`}
        <div class="confirm-meta">
          <div class="confirm-title">${title}</div>
          <div class="confirm-sub">${artists} · ${year}</div>
          ${genres ? `<span class="confirm-tag">${genres}</span>` : ''}
        </div>
      </div>
      <div class="field">
        <label>Vinyl Color</label>
        <input type="text" id="vColorFinal" value="${color}" placeholder="e.g. Black" />
      </div>
      <div class="field">
        <label>Rating</label>
        <div class="rating-row" id="vStars">
          ${[1,2,3,4,5].map(n => `<span class="star" onclick="setVinylRating(${n})">★</span>`).join('')}
        </div>
      </div>
      <button class="btn-save" onclick="saveVinyl()">save to vault →</button>
      <button class="btn-secondary" onclick="clearVinylConfirm()">← back to results</button>
    </div>`;
}

function setVinylRating(n) {
  vinylRating = n;
  document.querySelectorAll('#vStars .star').forEach((s, i) => s.classList.toggle('lit', i < n));
}

function clearVinylConfirm() {
  document.getElementById('vConfirm').innerHTML = '';
  selectedVinyl = null;
}

async function saveVinyl() {
  if (!vaultHandle) { showToast('connect your vault first', 'error'); return; }
  const color = document.getElementById('vColorFinal').value.trim() || 'Unknown';
  const data = selectedVinyl;
  let title, artists, year, released, master_id, genres, styles, coverUrl, tracklist, notes;

  if (data && !data._fallback) {
    title = data.title;
    artists = data.artists ? data.artists.map(a => a.name.replace(/\s\(\d+\)$/, '').trim()) : [document.getElementById('vArtist').value];
    year = data.year || ''; released = data.released || ''; master_id = data.master_id || '';
    genres = data.genres || []; styles = data.styles || [];
    coverUrl = data.images?.[0]?.uri || '';
    tracklist = data.tracklist ? data.tracklist.map(t => `${t.position}. ${t.title}${t.duration?' ('+t.duration+')':''}`).join('\n') : '';
    notes = data.notes || '';
  } else {
    const r = data?._result || {};
    const parts = (r.title || '').split(' - ');
    title = parts.length > 1 ? parts.slice(1).join(' - ') : parts[0];
    artists = [document.getElementById('vArtist').value];
    year = r.year || ''; released = ''; master_id = ''; genres = []; styles = [];
    coverUrl = r.cover_image || ''; tracklist = ''; notes = '';
  }

  const sanitize = s => (s || '').replace(/[\\/:*?"<>|]/g, '-');
  let filename = sanitize(title);
  if (filename.toLowerCase() === sanitize(artists[0]).toLowerCase()) filename += ' (Album)';
  filename += '.md';

  const createdDate = new Date().toISOString().slice(0, 10);
  const content = `---
category: "[[Albums]]"
tags:
  - music
  - albums
  - vinyls
color: "${color}"
artist:
${artists.map(a=>`  - "[[${a}]]"`).join('\n')}
title: "${title}"
year: ${year}
released: "${released}"
master_id: ${master_id}
genre:
${genres.map(g=>`  - "${g}"`).join('\n')}
styles:
${styles.map(s=>`  - "${s}"`).join('\n')}
rating: ${vinylRating || ''}
created: ${createdDate}
---

${coverUrl ? `![Album Cover|300](${coverUrl})\n` : ''}
## Tracklist
${tracklist || 'Not available.'}

---
## Notes from Discogs
${notes}
`;

  try {
    const refs = await getOrCreateFolder(vaultHandle, 'References');
    const vinylFolder = await getOrCreateFolder(refs, 'Vinyl');
    const musiciansFolder = await getOrCreateFolder(refs, 'Musicians');

    // Create musician stubs for any new artists
    for (const artist of artists) {
      const artistFilename = sanitize(artist) + '.md';
      try {
        await musiciansFolder.getFileHandle(artistFilename);
      } catch(e) {
        const stub = `---\ncategory: "[[Musicians]]"\ntags:\n  - artist\nname: "${artist}"\ncreated: ${createdDate}\n---\n\n# ${artist}\n`;
        await writeFile(musiciansFolder, artistFilename, stub);
      }
    }

    await writeFile(vinylFolder, filename, content);
    addRecent({ type: 'vinyl', title, sub: artists.join(', '), cover: coverUrl });
    showToast(`saved: ${title}`, 'success');
    resetVinylForm();
    await loadCollections();
  } catch(e) { showToast('save failed — check vault permissions', 'error'); }
}

function resetVinylForm() {
  document.getElementById('vArtist').value = '';
  document.getElementById('vTitle').value = '';
  document.getElementById('vColor').value = '';
  document.getElementById('vResults').innerHTML = '';
  document.getElementById('vConfirm').innerHTML = '';
  selectedVinyl = null; vinylRating = 0;
}

// ════════════════════════════════════════════
// BOOKS ADD
// ════════════════════════════════════════════
async function searchBooks() {
  const author = document.getElementById('bAuthor').value.trim();
  const title = document.getElementById('bTitle').value.trim();
  if (!author || !title) { showToast('enter author and title', 'error'); return; }

  const btn = document.getElementById('bSearchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>searching...';
  document.getElementById('bResults').innerHTML = '';
  document.getElementById('bConfirm').innerHTML = '';
  selectedBook = null;

  try {
    const url = `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}&limit=6`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.docs || data.docs.length === 0) {
      document.getElementById('bResults').innerHTML = '<p class="hint">no results — try adjusting the search</p>';
    } else {
      renderBookResults(data.docs.slice(0, 6));
    }
  } catch(e) { showToast('open library search failed', 'error'); }

  btn.disabled = false;
  btn.textContent = '+ search open library';
}

function renderBookResults(docs) {
  window._bookResults = docs;
  document.getElementById('bResults').innerHTML = `
    <div class="section">
      <div class="section-label">select edition</div>
      <div class="results-grid">
        ${docs.map((d, i) => {
          const cover = d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : null;
          return `<div class="result-card" onclick="selectBook(${i})" id="br-${i}">
            ${cover ? `<img class="result-cover" src="${cover}" alt="" loading="lazy">` : `<div class="result-cover-placeholder">☰</div>`}
            <div class="result-info">
              <div class="result-title">${d.title}</div>
              <div class="result-sub">${d.first_publish_year || '—'}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

async function selectBook(index) {
  document.querySelectorAll('[id^="br-"]').forEach(el => el.classList.remove('selected'));
  document.getElementById(`br-${index}`).classList.add('selected');
  const doc = window._bookResults[index];
  document.getElementById('bConfirm').innerHTML = '<div class="loading-row"><span class="spinner"></span>loading book data...</div>';

  let description = '';
  if (doc.key) {
    try {
      const res = await fetch(`https://openlibrary.org${doc.key}.json`);
      const work = await res.json();
      description = typeof work.description === 'string' ? work.description : work.description?.value || '';
      if (description.length > 800) description = description.slice(0, 800).trimEnd() + '…';
    } catch(e) {}
  }

  selectedBook = { ...doc, _description: description };
  bookRating = 0;
  renderBookConfirm(selectedBook);
}

function renderBookConfirm(doc) {
  const cover = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg` : null;
  const author = document.getElementById('bAuthor').value;
  const today = new Date().toISOString().slice(0, 10);

  document.getElementById('bConfirm').innerHTML = `
    <div class="confirm-section">
      <div class="section-label">confirm & save</div>
      <div class="confirm-header">
        ${cover ? `<img class="confirm-cover" src="${cover}" alt="">` : `<div class="confirm-cover-placeholder">☰</div>`}
        <div class="confirm-meta">
          <div class="confirm-title">${doc.title}</div>
          <div class="confirm-sub">${author} · ${doc.first_publish_year || '—'}</div>
          ${doc.number_of_pages_median ? `<span class="confirm-tag">${doc.number_of_pages_median} pages</span>` : ''}
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Format</label>
          <select id="bForm">
            <option>Audiobook</option>
            <option>Physical</option>
            <option>Kindle</option>
            <option>PDF</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="bStatus">
            <option>Read</option>
            <option>Reading</option>
            <option>Want to Read</option>
            <option>Did Not Finish</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Start Date</label>
          <input type="date" id="bStart" />
        </div>
        <div class="field">
          <label>End Date</label>
          <input type="date" id="bEnd" value="${today}" />
        </div>
      </div>
      <div class="field">
        <label>Rating</label>
        <div class="rating-row" id="bStars">
          ${[1,2,3,4,5].map(n => `<span class="star" onclick="setBookRating(${n})">★</span>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="bNotes" placeholder="Optional thoughts..."></textarea>
      </div>
      <button class="btn-save" onclick="saveBook()">save to vault →</button>
      <button class="btn-secondary" onclick="clearBookConfirm()">← back to results</button>
    </div>`;
}

function setBookRating(n) {
  bookRating = n;
  document.querySelectorAll('#bStars .star').forEach((s, i) => s.classList.toggle('lit', i < n));
}

function clearBookConfirm() {
  document.getElementById('bConfirm').innerHTML = '';
  selectedBook = null;
}

async function saveBook() {
  if (!vaultHandle) { showToast('connect your vault first', 'error'); return; }
  const doc = selectedBook;
  const author = document.getElementById('bAuthor').value.trim();
  const form = document.getElementById('bForm').value;
  const status = document.getElementById('bStatus').value;
  const startDate = document.getElementById('bStart').value;
  const endDate = document.getElementById('bEnd').value;
  const notes = document.getElementById('bNotes').value.trim();
  const title = doc.title;
  const isbn = doc.isbn?.[0] || '';
  const year = doc.first_publish_year || '';
  const pages = doc.number_of_pages_median || '';
  const publisher = doc.publisher?.[0] || '';
  const cover = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg` : '';
  const subjects = (doc.subject || []).slice(0, 4);
  const description = doc._description || '_No description available._';

  const sanitize = s => (s || '').replace(/[\\/:*?"<>|]/g, '-');
  const filename = sanitize(title) + '.md';
  const createdDate = new Date().toISOString().slice(0, 10);
  const starRating = bookRating ? '⭐'.repeat(bookRating) + '☆'.repeat(5 - bookRating) : '';

  const content = `---
category: "[[Books]]"
tags:
  - books
  - reading
author:
  - "[[${author}]]"
title: "${title.replace(/"/g,"'")}"
isbn: "${isbn}"
year: ${year}
pages: ${pages}
publisher: "${publisher.replace(/"/g,"'")}"
genre:
${subjects.map(s=>`  - "${s}"`).join('\n')}
form: "${form}"
status: "${status}"
start_date: "${startDate}"
end_date: "${endDate}"
rating: ${bookRating || ''}
created: ${createdDate}
---

${cover ? `![Book Cover|200](${cover})\n` : ''}
## Synopsis
${description}

---
## My Notes
${notes || '_No notes yet._'}

${starRating ? `**Rating:** ${starRating} (${bookRating}/5)\n` : ''}
---
## Details
| Field | Value |
|---|---|
| Author | ${author} |
| Published | ${year} |
| Pages | ${pages} |
| Publisher | ${publisher || 'N/A'} |
| ISBN | ${isbn || 'N/A'} |
| Format | ${form} |
| Status | ${status} |
${startDate ? `| Started | ${startDate} |` : ''}
${endDate ? `| Finished | ${endDate} |` : ''}
`;

  try {
    const refs = await getOrCreateFolder(vaultHandle, 'References');
    const booksFolder = await getOrCreateFolder(refs, 'Books');
    const authorsFolder = await getOrCreateFolder(refs, 'Authors');

    // Create author stub if it doesn't exist
    const authorFilename = sanitize(author) + '.md';
    try {
      await authorsFolder.getFileHandle(authorFilename);
    } catch(e) {
      // Doesn't exist — create stub
      const authorStub = `---\ncategory: "[[Authors]]"\ntags:\n  - author\nname: "${author}"\ncreated: ${createdDate}\n---\n\n# ${author}\n`;
      await writeFile(authorsFolder, authorFilename, authorStub);
    }

    await writeFile(booksFolder, filename, content);
    addRecent({ type: 'book', title, sub: author, cover });
    showToast(`saved: ${title}`, 'success');
    resetBookForm();
    await loadCollections();
  } catch(e) { showToast('save failed — check vault permissions', 'error'); }
}

function resetBookForm() {
  document.getElementById('bAuthor').value = '';
  document.getElementById('bTitle').value = '';
  document.getElementById('bResults').innerHTML = '';
  document.getElementById('bConfirm').innerHTML = '';
  selectedBook = null; bookRating = 0;
}

// ════════════════════════════════════════════
// RECENT
// ════════════════════════════════════════════
function addRecent(entry) {
  recentEntries.unshift({ ...entry, ts: Date.now() });
  recentEntries = recentEntries.slice(0, 6);
  localStorage.setItem('ledger_recent', JSON.stringify(recentEntries));
  renderRecent();
}

function renderRecent() {
  if (recentEntries.length === 0) return;
  const section = document.getElementById('recentSection');
  section.style.display = 'block';
  document.getElementById('recentList').innerHTML = recentEntries.map(e => `
    <div class="recent-item">
      ${e.cover && !e.cover.includes('spacer')
        ? `<img class="recent-cover" src="${e.cover}" alt="">`
        : `<div class="recent-cover" style="display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--faint)">${e.type==='vinyl'?'♪':'☰'}</div>`}
      <div>
        <div class="recent-title">${e.title}</div>
        <div class="recent-sub">${e.sub}</div>
      </div>
      <span class="badge">${e.type}</span>
    </div>`).join('');
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
