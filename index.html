<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #1a1612;
  --bg2:       #221e19;
  --card:      #2a2420;
  --card2:     #322c26;
  --border:    #3d3630;
  --border2:   #4a433b;
  --amber:     #c8a96e;
  --amber-dim: #9a7e4f;
  --amber-bg:  rgba(200,169,110,0.08);
  --cream:     #e8dcc8;
  --muted:     #8a7e6e;
  --faint:     #5a5040;
  --red:       #c87060;
  --blue:      #6090b0;
  --green:     #70a880;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding: 24px 16px 60px;
  max-width: 760px;
  margin: 0 auto;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 10px;
}

.header-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.back-link {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  opacity: 0.7;
}
.back-link:hover { color: var(--amber); opacity: 1; }

.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--cream);
  letter-spacing: -0.02em;
}
.wordmark em { font-style: italic; color: var(--amber); }

.vault-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-transform: uppercase;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--faint);
  transition: background 0.3s;
}
.status-dot.connected { background: var(--green); }

.btn-sm {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-sm:hover { border-color: var(--amber); color: var(--amber); }

/* ── MAIN NAV ── */
.main-nav {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
}

.nav-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn.active {
  background: var(--card2);
  color: var(--cream);
  border: 1px solid var(--border2);
}

/* ── SUB TABS ── */
.sub-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px;
  margin-bottom: 18px;
}

.sub-tab {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.sub-tab.active {
  background: var(--card);
  color: var(--cream);
  border: 1px solid var(--border);
}

/* ── VAULT BANNER ── */
.vault-banner {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.vault-name { color: var(--amber); font-size: 11px; }

/* ── SECTION CARD ── */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

/* ── INPUTS ── */
.field { margin-bottom: 14px; }

.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px dashed var(--border2);
  border-radius: 5px;
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus,
.field select:focus,
.field textarea:focus { border-color: var(--amber); border-style: solid; }
.field select option { background: var(--card2); }
.field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── SEARCH BTN ── */
.btn-search {
  width: 100%;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.btn-search:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); border-style: solid; }
.btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── RESULTS GRID ── */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.result-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.result-card:hover { border-color: var(--amber-dim); transform: translateY(-1px); }
.result-card.selected { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }

.result-cover {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; display: block;
  background: var(--card2);
}
.result-cover-placeholder {
  width: 100%; aspect-ratio: 1;
  background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--faint);
}
.result-info { padding: 8px; }
.result-title {
  font-size: 10px; color: var(--cream); line-height: 1.3; margin-bottom: 3px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.result-sub { font-size: 9px; color: var(--muted); }

/* ── CONFIRM ── */
.confirm-section {
  background: var(--card);
  border: 1px solid var(--amber-dim);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}

.confirm-header {
  display: flex; gap: 14px; align-items: flex-start;
  margin-bottom: 18px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.confirm-cover {
  width: 72px; height: 72px; object-fit: cover;
  border-radius: 4px; background: var(--card2); flex-shrink: 0;
}
.confirm-cover-placeholder {
  width: 72px; height: 72px; background: var(--card2);
  border-radius: 4px; display: flex; align-items: center;
  justify-content: center; font-size: 28px; flex-shrink: 0;
}
.confirm-meta { flex: 1; min-width: 0; }
.confirm-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px; color: var(--cream); margin-bottom: 4px; line-height: 1.3;
}
.confirm-sub { font-size: 11px; color: var(--muted); }
.confirm-tag {
  display: inline-block;
  background: var(--amber-bg); border: 1px solid var(--amber-dim);
  color: var(--amber); font-size: 9px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-top: 6px;
}

/* ── STARS ── */
.rating-row { display: flex; gap: 6px; align-items: center; }
.star { font-size: 18px; cursor: pointer; color: var(--faint); transition: color 0.15s; user-select: none; }
.star.lit { color: var(--amber); }

/* ── SAVE BTN ── */
.btn-save {
  width: 100%; background: var(--amber); border: none;
  border-radius: 7px; color: #1a1612;
  font-family: 'DM Mono', monospace; font-size: 12px;
  font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 16px; cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.btn-save:hover:not(:disabled) { background: #d4b87e; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  width: 100%; background: transparent;
  border: 1px solid var(--border2); border-radius: 7px;
  color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 13px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-secondary:hover { color: var(--cream); }

/* ── BROWSE ── */
.browse-controls {
  margin-bottom: 10px;
}

.browse-search {
  width: 100%; box-sizing: border-box;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--cream);
  font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 9px 12px; outline: none;
}
.browse-search:focus { border-color: var(--amber); }

.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 14px;
}
.filter-select {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 0.06em; padding: 7px 10px; cursor: pointer;
  outline: none; flex: 1; min-width: 120px;
}
.filter-select:focus { border-color: var(--amber); }
.filter-select option { background: var(--card2); }
.filter-select.active { border-color: var(--amber); color: var(--amber); }

.collection-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.fav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 12px;
  margin-top: 10px;
}
.fav-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 5px;
}
.fav-cover {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.fav-cover-placeholder {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  opacity: 0.4;
}
.fav-title {
  font-size: 11px;
  color: var(--text1);
  line-height: 1.3;
  max-height: 2.6em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.fav-sub {
  font-size: 10px;
  color: var(--faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
}
.fav-rating {
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 1px;
}

.coll-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: all 0.2s;
  cursor: default;
}
.coll-card:hover { border-color: var(--border2); transform: translateY(-2px); }

.coll-cover {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; display: block; background: var(--card2);
}
.coll-cover-placeholder {
  width: 100%; aspect-ratio: 1;
  background: var(--card2); display: flex;
  align-items: center; justify-content: center;
  font-size: 32px; color: var(--faint);
}
.coll-info { padding: 10px; }
.coll-title {
  font-size: 11px; color: var(--cream); line-height: 1.3;
  margin-bottom: 4px; font-weight: 500;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.coll-sub { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
.coll-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.coll-tag {
  font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 5px; border-radius: 2px; border: 1px solid var(--border2);
  color: var(--faint);
}
.coll-tag.amber { border-color: var(--amber-dim); color: var(--amber-dim); }

.browse-empty {
  grid-column: 1/-1; text-align: center;
  padding: 48px 0; color: var(--faint);
  font-size: 11px; letter-spacing: 0.08em;
}

.browse-count {
  font-size: 10px; color: var(--faint);
  letter-spacing: 0.08em; margin-bottom: 14px;
  text-transform: uppercase;
}

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
}
.stat-card.full { grid-column: 1 / -1; }

.stat-label {
  font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
}

.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 36px; color: var(--amber); line-height: 1;
  margin-bottom: 4px;
}
.stat-sublabel { font-size: 10px; color: var(--faint); letter-spacing: 0.06em; }

/* Bar chart */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { font-size: 10px; color: var(--muted); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.6s ease; }
.bar-fill.blue { background: var(--blue); }
.bar-fill.green { background: var(--green); }
.bar-count { font-size: 10px; color: var(--faint); width: 24px; text-align: right; flex-shrink: 0; }

/* Donut chart */
.donut-wrap {
  display: flex; align-items: center; gap: 20px;
}
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── LOADING / TOAST ── */
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid var(--border2); border-top-color: var(--amber);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-row {
  display: flex; align-items: center; justify-content: center;
  padding: 24px; color: var(--muted); font-size: 11px; letter-spacing: 0.08em;
}

.hint { text-align: center; color: var(--faint); font-size: 11px; letter-spacing: 0.06em; padding: 20px 0 4px; }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 12px 20px;
  font-size: 11px; letter-spacing: 0.06em; color: var(--cream);
  transition: transform 0.3s ease; z-index: 100; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

/* ── RECENT ── */
.recent-label {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--faint); margin-bottom: 12px; margin-top: 8px;
}
.recent-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.recent-item:last-child { border-bottom: none; }
.recent-cover { width: 36px; height: 36px; border-radius: 3px; object-fit: cover; background: var(--card2); flex-shrink: 0; }
.recent-title { font-size: 12px; color: var(--cream); }
.recent-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.badge {
  margin-left: auto; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); background: var(--bg2); border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <a class="back-link" href="https://www.stoult.com/workshop/">← return to the workshop</a>
    <div class="wordmark">the <em>ledger</em></div>
  </div>
  <div class="vault-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">no vault</span>
    <button class="btn-sm" id="btnConnect">connect</button>
  </div>
</header>

<!-- MAIN NAV -->
<nav class="main-nav">
  <button class="nav-btn active" id="navAdd" onclick="switchNav('add')">add</button>
  <button class="nav-btn" id="navBrowse" onclick="switchNav('browse')">browse</button>
  <button class="nav-btn" id="navStats" onclick="switchNav('stats')">stats</button>
</nav>

<!-- VAULT BANNER -->
<div class="vault-banner" id="vaultBanner" style="display:none">
  <span style="color:var(--muted);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;">vault</span>
  <span class="vault-name" id="vaultName">—</span>
  <button class="btn-sm" onclick="disconnectVault()">change</button>
</div>

<!-- ════════════════ ADD PANEL ════════════════ -->
<div id="panelAdd">
  <div class="sub-tabs">
    <button class="sub-tab active" id="addTabVinyl" onclick="switchAddTab('vinyl')">⬤ vinyl</button>
    <button class="sub-tab" id="addTabBooks" onclick="switchAddTab('books')">⬤ books</button>
  </div>

  <!-- VINYL ADD -->
  <div id="addVinyl">
    <div class="section">
      <div class="section-label">search discogs</div>
      <div class="field"><label>Artist</label><input type="text" id="vArtist" placeholder="e.g. Kendrick Lamar" /></div>
      <div class="field"><label>Album Title</label><input type="text" id="vTitle" placeholder="e.g. GNX" /></div>
      <div class="field"><label>Vinyl Color</label><input type="text" id="vColor" placeholder="e.g. Black, Translucent Green" /></div>
      <button class="btn-search" id="vSearchBtn" onclick="searchVinyl()">+ search discogs</button>
    </div>
    <div id="vResults"></div>
    <div id="vConfirm"></div>
  </div>

  <!-- BOOKS ADD -->
  <div id="addBooks" style="display:none">
    <div class="section">
      <div class="section-label">search open library</div>
      <div class="field"><label>Author</label><input type="text" id="bAuthor" placeholder="e.g. Cormac McCarthy" /></div>
      <div class="field"><label>Title</label><input type="text" id="bTitle" placeholder="e.g. Blood Meridian" /></div>
      <button class="btn-search" id="bSearchBtn" onclick="searchBooks()">+ search open library</button>
    </div>
    <div id="bResults"></div>
    <div id="bConfirm"></div>
  </div>

  <!-- RECENT -->
  <div id="recentSection" style="display:none">
    <div class="recent-label">recent entries</div>
    <div id="recentList"></div>
  </div>
</div>

<!-- ════════════════ BROWSE PANEL ════════════════ -->
<div id="panelBrowse" style="display:none">
  <div class="sub-tabs">
    <button class="sub-tab active" id="browseTabVinyl" onclick="switchBrowseTab('vinyl')">⬤ vinyl</button>
    <button class="sub-tab" id="browseTabBooks" onclick="switchBrowseTab('books')">⬤ books</button>
  </div>

  <div class="browse-controls">
    <input class="browse-search" id="browseSearch" type="text" placeholder="search by title or artist..." oninput="debouncedSearch()">
  </div>

  <div class="filter-bar" id="filterBar"></div>

  <div class="browse-count" id="browseCount"></div>
  <div class="collection-grid" id="collectionGrid">
    <div class="browse-empty">connect your vault to browse</div>
  </div>
</div>

<!-- ════════════════ STATS PANEL ════════════════ -->
<div id="panelStats" style="display:none">
  <div class="sub-tabs">
    <button class="sub-tab active" id="statsTabVinyl" onclick="switchStatsTab('vinyl')">⬤ vinyl</button>
    <button class="sub-tab" id="statsTabBooks" onclick="switchStatsTab('books')">⬤ books</button>
  </div>
  <div id="statsContent">
    <div class="stat-card"><div class="loading-row">connect your vault to see stats</div></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

async function connectVault() {
  try {
    vaultHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    updateVaultUI();
    showToast('vault connected — building index...', 'success');
    await loadCollections();
    showToast(`indexed ${vinylIndex.length} records · ${booksIndex.length} books`, 'success');
    const activeNav = document.querySelector('.nav-btn.active')?.id;
    if (activeNav === 'navBrowse') renderBrowse();
    if (activeNav === 'navStats') renderStats();
  } catch(e) {
    if (e.name !== 'AbortError') showToast('could not connect vault', 'error');
  }
}

function disconnectVault() {
  vaultHandle = null;
  vinylCollection = [];
  booksCollection = [];
  browseCache = { vinyl: null, books: null };
  updateVaultUI();
}

function updateVaultUI() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const banner = document.getElementById('vaultBanner');
  const btn = document.getElementById('btnConnect');
  if (vaultHandle) {
    dot.classList.add('connected');
    txt.textContent = 'connected';
    btn.style.display = 'none';
    banner.style.display = 'flex';
    document.getElementById('vaultName').textContent = vaultHandle.name;
  } else {
    dot.classList.remove('connected');
    txt.textContent = 'no vault';
    btn.style.display = 'inline-block';
    banner.style.display = 'none';
  }
}

// COLLECTION — search-driven, no upfront indexing
// ════════════════════════════════════════════
let vinylDirHandle = null;
let booksDirHandle = null;
let searchDebounce = null;

// Filename-only indexes built on connect (no file reads, fast)
// Maps artist/author name (lowercase) → Set of album/book filenames that belong to them
// Built by reading frontmatter of each vinyl/book file once per session... 
// Actually: we use the Wikilinks in the filename index approach:
// vinyl files are named after albums. Musicians/ stubs are named after artists.
// We build: artistName → [album filenames] by reading each vinyl file's artist field.
// But that's slow. Instead: store handle maps and search both title AND content lazily.

// Simple approach: index is just { name (display), filename } for quick filename match
// For artist search, we read the file only if filename doesn't match but we need content match
// → On connect, build a lightweight map: album filename → artist name string
//   by reading ONLY the artist: line from each file (first ~5 lines, not full parse)
let vinylIndex = []; // [{ filename, artist }]
let booksIndex = []; // [{ filename, author }]

async function loadCollections() {
  if (!vaultHandle) return;
  try {
    const refs = await vaultHandle.getDirectoryHandle('References', { create: false });
    try { vinylDirHandle = await refs.getDirectoryHandle('Vinyl', { create: false }); } catch(e) { vinylDirHandle = null; }
    try { booksDirHandle = await refs.getDirectoryHandle('Books', { create: false }); } catch(e) { booksDirHandle = null; }

    // Build lightweight index: read only first ~300 chars of each file to get artist/author
    vinylIndex = await buildIndex(vinylDirHandle, 'artist');
    booksIndex = await buildIndex(booksDirHandle, 'author');

    vinylCollection = [];
    booksCollection = [];
    browseCache = { vinyl: null, books: null };
    renderBrowse();
    renderStats();
  } catch(e) { /* no References folder yet */ }
}

async function buildIndex(dirHandle, field) {
  if (!dirHandle) return [];
  const index = [];
  const MAX_BYTES = 400; // only read start of file for artist/author field

  const handles = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'file' && name.endsWith('.md')) handles.push({ name, handle });
  }

  // Read just the first 400 bytes of each file in parallel batches
  const BATCH = 80;
  for (let i = 0; i < handles.length; i += BATCH) {
    const batch = handles.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async ({ name, handle }) => {
      try {
        const file = await handle.getFile();
        const slice = file.slice(0, MAX_BYTES);
        const text = await slice.text();
        const fieldVal = extractField(text, field);
        return { filename: name, [field]: (fieldVal || '').toLowerCase() };
      } catch(e) { return { filename: name, [field]: '' }; }
    }));
    results.forEach(r => index.push(r));
  }
  return index;
}

// Extract a single YAML field value from partial file text (handles wikilinks like [[Name]])
function extractField(text, field) {
  text = text.replace(/\r\n/g, '\n');
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Inline: "artist: Some Value"
    const inlineMatch = line.match(new RegExp(`^${field}:\\s*(.+)$`));
    if (inlineMatch) {
      return inlineMatch[1].replace(/\[\[|\]\]|"|'/g, '').trim();
    }
    // List field: "artist:" followed by "  - [[Value]]" on next line
    if (line.match(new RegExp(`^${field}:\\s*$`)) && lines[i+1]?.match(/^\s+-/)) {
      const listVal = lines[i+1].replace(/^\s+-\s*/, '').replace(/\[\[|\]\]|"|'/g, '').trim();
      return listVal;
    }
  }
  return '';
}

function parseRating(val) {
  if (!val) return 0;
  const s = String(val).trim();
  // Numeric string
  const n = parseInt(s);
  if (!isNaN(n)) return n;
  // Emoji stars: count ⭐ characters
  return [...s].filter(c => c === '⭐' || c === '★').length;
}

function parseFrontmatter(text) {
  // Normalize line endings (Windows CRLF → LF)
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const match = text.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return null;
  const yaml = match[1];
  const result = {};

  // Simple YAML parser for our known fields
  const lines = yaml.split('\n');
  let currentKey = null;
  let inList = false;

  for (const line of lines) {
    const listMatch = line.match(/^  - (.+)$/);
    const keyMatch = line.match(/^(\w+):\s*(.*)$/);

    if (listMatch && inList) {
      const val = listMatch[1].replace(/^"(.*)"$/, '$1').replace(/\[\[.*?\|(.*?)\]\]/, '$1').replace(/\[\[(.*?)\]\]/, '$1');
      if (!result[currentKey]) result[currentKey] = [];
      result[currentKey].push(val);
    } else if (keyMatch) {
      currentKey = keyMatch[1];
      const raw = keyMatch[2].trim();
      const val = raw.replace(/^"(.*)"$/, '$1').replace(/\[\[.*?\|(.*?)\]\]/, '$1').replace(/\[\[(.*?)\]\]/, '$1');
      if (raw === '' || raw === 'null') {
        result[currentKey] = null;
        inList = true;  // next lines may be list items
      } else {
        result[currentKey] = val;
        inList = false;
      }
    } else if (line.trim() === '' || (line.length > 0 && !line.startsWith(' '))) {
      // Non-list, non-key line resets inList
      inList = false;
    }
  }

  // Extract cover image from body
  const coverMatch = text.match(/!\[.*?\]\((https?:\/\/[^\)]+)\)/);
  if (coverMatch) result._cover = coverMatch[1];

  return result;
}

function setFilter(key, value) {
  if (value === '') {
    delete activeFilters[key];
  } else {
    activeFilters[key] = value;
  }
  renderFilterBar();
  renderGrid();
}

function renderFilterBar() {
  const isVinyl = currentBrowseType === 'vinyl';
  const collection = isVinyl ? browseCache.vinyl : browseCache.books;
  const bar = document.getElementById('filterBar');
  if (!collection || collection.length === 0) { bar.innerHTML = ''; return; }

  const groups = isVinyl
    ? [
        { key: 'genre', label: 'all genres' },
        { key: 'color', label: 'all colors' },
        { key: 'year', label: 'all decades', decade: true },
      ]
    : [
        { key: 'status', label: 'all statuses' },
        { key: 'genre', label: 'all genres' },
      ];

  // Helper: filter collection by all active filters EXCEPT one key
  function collectionWithout(excludeKey) {
    return collection.filter(item => {
      for (const [key, value] of Object.entries(activeFilters)) {
        if (key === excludeKey) continue;
        if (key === 'year') {
          const y = parseInt(item.year);
          const decade = y ? Math.floor(y/10)*10+'s' : null;
          if (decade !== value) return false;
        } else {
          const v = item[key];
          const vals = Array.isArray(v) ? v : (v ? [v] : []);
          if (!vals.includes(value)) return false;
        }
      }
      return true;
    });
  }

  let html = '';
  for (const group of groups) {
    // Count against collection filtered by all OTHER active filters
    const basis = collectionWithout(group.key);
    const valueCounts = {};
    basis.forEach(item => {
      if (group.decade) {
        const y = parseInt(item.year);
        if (y) { const d = Math.floor(y/10)*10+'s'; valueCounts[d] = (valueCounts[d]||0)+1; }
      } else {
        const v = item[group.key];
        const vals = Array.isArray(v) ? v : (v ? [v] : []);
        vals.forEach(x => { if (x) valueCounts[x] = (valueCounts[x]||0)+1; });
      }
    });

    let sorted = Object.entries(valueCounts).sort((a,b) => b[1]-a[1]);
    if (group.decade) sorted = sorted.sort((a,b) => parseInt(a[0])-parseInt(b[0]));
    if (sorted.length === 0) continue;

    const active = activeFilters[group.key] || '';
    html += `<select class="filter-select ${active ? 'active' : ''}"
      onchange="setFilter('${group.key}', this.value)">
      <option value="">${group.label}</option>
      ${sorted.map(([v, n]) => `<option value="${v.replace(/"/g,'&quot;')}" ${active===v?'selected':''}>${v} (${n})</option>`).join('')}
    </select>`;
  }

  bar.innerHTML = html;
}

function renderGrid() {
  const isVinyl = currentBrowseType === 'vinyl';
  const collection = isVinyl ? browseCache.vinyl : browseCache.books;
  const grid = document.getElementById('collectionGrid');
  const countEl = document.getElementById('browseCount');
  const q = document.getElementById('browseSearch').value.trim().toLowerCase();

  if (!collection) return;

  let items = collection;

  // Text search
  if (q) {
    const field = isVinyl ? 'artist' : 'author';
    items = items.filter(item => {
      const title = (item.title || item.filename || '').toLowerCase();
      const person = Array.isArray(item[field])
        ? item[field].join(' ').toLowerCase()
        : (item[field] || '').toLowerCase();
      return title.includes(q) || person.includes(q);
    });
  }

  // Chip filters
  for (const [key, value] of Object.entries(activeFilters)) {
    items = items.filter(item => {
      if (key === 'year') {
        const y = parseInt(item.year);
        const decade = y ? Math.floor(y / 10) * 10 + 's' : null;
        return decade === value;
      }
      const v = item[key];
      const vals = Array.isArray(v) ? v : (v ? [v] : []);
      return vals.includes(value);
    });
  }

  const label = isVinyl ? 'records' : 'books';
  countEl.textContent = `${items.length} of ${collection.length} ${label}`;

  if (items.length === 0) {
    grid.innerHTML = `<div class="browse-empty">no results</div>`;
    return;
  }

  grid.innerHTML = items.map(item => isVinyl ? renderVinylCard(item) : renderBookCard(item)).join('');
}

async function filterCollection() {
  const isVinyl = currentBrowseType === 'vinyl';
  const dirHandle = isVinyl ? vinylDirHandle : booksDirHandle;
  const cacheKey = isVinyl ? 'vinyl' : 'books';
  const grid = document.getElementById('collectionGrid');
  const countEl = document.getElementById('browseCount');
  const label = isVinyl ? 'records' : 'books';

  if (!vaultHandle) {
    countEl.textContent = '';
    document.getElementById('filterBar').innerHTML = '';
    grid.innerHTML = `<div class="browse-empty">
      <div style="margin-bottom:12px">connect your vault to browse</div>
      <button class="btn-sm" onclick="connectVault()" style="font-size:11px;padding:7px 14px">connect vault</button>
    </div>`;
    return;
  }

  if (!dirHandle) {
    countEl.textContent = '';
    grid.innerHTML = `<div class="browse-empty">no ${label} folder found in vault</div>`;
    return;
  }

  // Load full collection into cache if not yet done
  if (!browseCache[cacheKey]) {
    grid.innerHTML = `<div class="browse-empty"><span class="spinner"></span> loading ${label}...</div>`;
    countEl.textContent = '';
    browseCache[cacheKey] = await readAllMdFiles(dirHandle);
  }

  renderFilterBar();
  renderGrid();
}

function renderVinylCard(item) {
  const title = item.title || item.filename?.replace('.md','') || '—';
  const artist = Array.isArray(item.artist) ? item.artist[0] : (item.artist || '—');
  const year = item.year || '';
  const color = item.color || '';
  const genres = Array.isArray(item.genre) ? item.genre.slice(0,1) : (item.genre ? [item.genre] : []);
  const rating = item.rating ? '⭐'.repeat(parseRating(item.rating)) : '';
  const cover = item._cover || '';

  return `<div class="coll-card">
    ${cover ? `<img class="coll-cover" src="${cover}" alt="" loading="lazy">` : `<div class="coll-cover-placeholder">♪</div>`}
    <div class="coll-info">
      <div class="coll-title">${title}</div>
      <div class="coll-sub">${artist}${year ? ' · ' + year : ''}</div>
      <div class="coll-tags">
        ${color ? `<span class="coll-tag">${color}</span>` : ''}
        ${genres.map(g => `<span class="coll-tag amber">${g}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderBookCard(item) {
  const title = item.title || item.filename?.replace('.md','') || '—';
  const author = Array.isArray(item.author) ? item.author[0] : (item.author || '—');
  const year = item.year || '';
  const status = item.status || '';
  const form = item.form || '';
  const cover = item._cover || '';

  const statusColor = status === 'Read' ? 'amber' : '';

  return `<div class="coll-card">
    ${cover ? `<img class="coll-cover" src="${cover}" alt="" loading="lazy">` : `<div class="coll-cover-placeholder">☰</div>`}
    <div class="coll-info">
      <div class="coll-title">${title}</div>
      <div class="coll-sub">${author}${year ? ' · ' + year : ''}</div>
      <div class="coll-tags">
        ${status ? `<span class="coll-tag ${statusColor}">${status}</span>` : ''}
        ${form ? `<span class="coll-tag">${form}</span>` : ''}
      </div>
    </div>
  </div>`;
}

async function renderStats() {
  const el = document.getElementById('statsContent');
  if (!vaultHandle) {
    el.innerHTML = '<div class="stat-card"><div class="loading-row">connect your vault to see stats</div></div>';
    return;
  }

  // Load full collections if not yet cached
  if (vinylCollection.length === 0 && vinylDirHandle) {
    el.innerHTML = '<div class="stat-card"><div class="loading-row"><span class="spinner"></span> loading collection for stats...</div></div>';
    vinylCollection = await readAllMdFiles(vinylDirHandle);
  }
  if (booksCollection.length === 0 && booksDirHandle) {
    booksCollection = await readAllMdFiles(booksDirHandle);
  }

  if (currentStatsType === 'vinyl') {
    el.innerHTML = renderVinylStats();
  } else {
    el.innerHTML = renderBookStats();
  }
}

async function readAllMdFiles(dirHandle) {
  if (!dirHandle) return [];
  const handles = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'file' && name.endsWith('.md')) handles.push({ name, handle });
  }
  const BATCH = 80;
  const items = [];
  for (let i = 0; i < handles.length; i += BATCH) {
    const batch = handles.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async ({ name, handle }) => {
      try {
        const file = await handle.getFile();
        const text = await file.text();
        const fm = parseFrontmatter(text);
        return fm ? { filename: name, ...fm } : null;
      } catch(e) { return null; }
    }));
    results.forEach(r => r && items.push(r));
  }
  return items;
}

function renderVinylStats() {
  const c = vinylCollection;
  if (c.length === 0) return '<div class="stat-card"><div class="loading-row">no vinyl found</div></div>';

  // Genre breakdown
  const genreCounts = {};
  c.forEach(item => {
    const genres = Array.isArray(item.genre) ? item.genre : (item.genre ? [item.genre] : []);
    genres.forEach(g => { if(g) genreCounts[g] = (genreCounts[g]||0) + 1; });
  });
  const topGenres = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxGenre = topGenres[0]?.[1] || 1;

  // Color distribution — split black from the rest
  const colorCounts = {};
  c.forEach(item => {
    if (item.color) {
      const col = item.color.trim();
      colorCounts[col] = (colorCounts[col]||0) + 1;
    }
  });
  const blackCount = Object.entries(colorCounts)
    .filter(([col]) => col.toLowerCase() === 'black')
    .reduce((s, [,n]) => s + n, 0);
  const topColors = Object.entries(colorCounts)
    .filter(([col]) => col.toLowerCase() !== 'black')
    .sort((a,b) => b[1]-a[1]).slice(0, 10);
  const maxColor = topColors[0]?.[1] || 1;

  // Top artists
  const artistCounts = {};
  c.forEach(item => {
    const artists = Array.isArray(item.artist) ? item.artist : (item.artist ? [item.artist] : []);
    artists.forEach(a => { if(a) artistCounts[a] = (artistCounts[a]||0) + 1; });
  });
  const topArtists = Object.entries(artistCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxArtist = topArtists[0]?.[1] || 1;

  // Avg rating
  const rated = c.filter(item => item.rating && parseRating(item.rating) > 0);
  const avgRating = rated.length ? (rated.reduce((s,i) => s + parseRating(i.rating), 0) / rated.length).toFixed(1) : '—';

  // Favorites (rating >= 7)
  const favorites = c
    .filter(item => item.rating && parseRating(item.rating) >= 7)
    .sort((a,b) => parseRating(b.rating) - parseRating(a.rating));

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">total records</div>
      <div class="stat-number">${c.length}</div>
      <div class="stat-sublabel">in your vault</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">avg rating</div>
      <div class="stat-number">${avgRating}</div>
      <div class="stat-sublabel">${rated.length} rated</div>
    </div>

    <div class="stat-card full">
      <div class="stat-label">genre breakdown</div>
      <div class="bar-chart">
        ${topGenres.map(([g,n]) => `
          <div class="bar-row">
            <div class="bar-label">${g}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxGenre*100)}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">black vinyl</div>
      <div class="stat-number">${blackCount}</div>
      <div class="stat-sublabel">${Math.round(blackCount/c.length*100)}% of collection</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">colored vinyl</div>
      <div class="stat-number">${c.length - blackCount}</div>
      <div class="stat-sublabel">${Math.round((c.length - blackCount)/c.length*100)}% of collection</div>
    </div>

    <div class="stat-card full">
      <div class="stat-label">colored vinyl <span style="opacity:0.45;font-size:10px;margin-left:6px">excluding black</span></div>
      <div class="bar-chart">
        ${topColors.map(([col,n]) => `
          <div class="bar-row">
            <div class="bar-label">${col}</div>
            <div class="bar-track"><div class="bar-fill blue" style="width:${Math.round(n/maxColor*100)}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="stat-card full">
      <div class="stat-label">top artists by record count</div>
      <div class="bar-chart">

function renderBookStats() {
  const c = booksCollection;
  if (c.length === 0) return '<div class="stat-card"><div class="loading-row">no books found</div></div>';

  // Books read per year
  const yearCounts = {};
  c.forEach(item => {
    if (item.status === 'Read' && item.end_date) {
      const yr = item.end_date.slice(0,4);
      if (yr && yr !== 'undefined') yearCounts[yr] = (yearCounts[yr]||0) + 1;
    }
  });
  const years = Object.entries(yearCounts).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxYear = years[0] ? Math.max(...years.map(y=>y[1])) : 1;

  // Genre breakdown
  const genreCounts = {};
  c.forEach(item => {
    const genres = Array.isArray(item.genre) ? item.genre : (item.genre ? [item.genre] : []);
    genres.forEach(g => { if(g) genreCounts[g] = (genreCounts[g]||0) + 1; });
  });
  const topGenres = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxGenre = topGenres[0]?.[1] || 1;

  // Totals
  const read = c.filter(i => i.status === 'Read').length;
  const rated = c.filter(i => i.rating && parseRating(i.rating) > 0);
  const avgRating = rated.length ? (rated.reduce((s,i)=>s+parseRating(i.rating),0)/rated.length).toFixed(1) : '—';

  // Favorites (rating = 5)
  const favorites = c
    .filter(item => item.rating && parseRating(item.rating) === 5)
    .sort((a,b) => (a.title||'').localeCompare(b.title||''));

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">total books</div>
      <div class="stat-number">${c.length}</div>
      <div class="stat-sublabel">in your vault</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">avg rating</div>
      <div class="stat-number">${avgRating}</div>
      <div class="stat-sublabel">${rated.length} rated</div>
    </div>

    <div class="stat-card full">
      <div class="stat-label">books read per year</div>
      ${years.length === 0
        ? '<div style="color:var(--faint);font-size:11px;">no finished books with dates found</div>'
        : `<div class="bar-chart">
          ${years.map(([yr,n]) => `
            <div class="bar-row">
              <div class="bar-label">${yr}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxYear*100)}%"></div></div>
              <div class="bar-count">${n}</div>
            </div>`).join('')}
          </div>`}
    </div>

    <div class="stat-card full">
      <div class="stat-label">genre breakdown</div>
      <div class="bar-chart">
        ${topGenres.map(([g,n]) => `
          <div class="bar-row">
            <div class="bar-label">${g}</div>
            <div class="bar-track"><div class="bar-fill green" style="width:${Math.round(n/maxGenre*100)}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join('')}
      </div>
    </div>

    ${favorites.length > 0 ? `
    <div class="stat-card full">
      <div class="stat-label">favorites <span style="opacity:0.45;font-size:10px;margin-left:6px">rated 5 stars · ${favorites.length} books</span></div>
      <div class="fav-grid">
        ${favorites.map(item => {
          const title = item.title || item.filename?.replace('.md','') || '—';
          const author = Array.isArray(item.author) ? item.author[0]?.replace(/\[\[|\]\]/g,'') : (item.author || '—');
          const cover = item._cover || '';
          return `<div class="fav-card">
            ${cover ? `<img class="fav-cover" src="${cover}" alt="" loading="lazy">` : `<div class="fav-cover fav-cover-placeholder">☰</div>`}
            <div class="fav-title">${title}</div>
            <div class="fav-sub">${author}</div>
            <div class="fav-rating">★★★★★</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}
  </div>`;
}

  const title = data ? data.title : (fallback ? fallback.title.split(' - ').slice(1).join(' - ') : '');
  const artists = data?.artists ? data.artists.map(a => a.name.replace(/\s\(\d+\)$/, '')).join(', ') : document.getElementById('vArtist').value;

  document.getElementById('vConfirm').innerHTML = `

}

  document.getElementById('vConfirm').innerHTML = '';

}

async function saveVinyl() {
  if (!vaultHandle) { showToast('connect your vault first', 'error'); return; }
  const color = document.getElementById('vColorFinal').value.trim() || 'Unknown';
  const data = selectedVinyl;
  let title, artists, year, released, master_id, genres, styles, coverUrl, tracklist, notes;

  if (data && !data._fallback) {
    title = data.title;
    artists = data.artists ? data.artists.map(a => a.name.replace(/\s\(\d+\)$/, '').trim()) : [document.getElementById('vArtist').value];
    year = data.year || ''; released = data.released || ''; master_id = data.master_id || '';
    genres = data.genres || []; styles = data.styles || [];
    coverUrl = data.images?.[0]?.uri || '';
    tracklist = data.tracklist ? data.tracklist.map(t => `${t.position}. ${t.title}${t.duration?' ('+t.duration+')':''}`).join('\n') : '';
    notes = data.notes || '';
  } else {
    const r = data?._result || {};
    const parts = (r.title || '').split(' - ');
    title = parts.length > 1 ? parts.slice(1).join(' - ') : parts[0];
    artists = [document.getElementById('vArtist').value];
    year = r.year || ''; released = ''; master_id = ''; genres = []; styles = [];
    coverUrl = r.cover_image || ''; tracklist = ''; notes = '';
  }

  const sanitize = s => (s || '').replace(/[\\/:*?"<>|]/g, '-');
  let filename = sanitize(title);
  if (filename.toLowerCase() === sanitize(artists[0]).toLowerCase()) filename += ' (Album)';
  filename += '.md';

  const createdDate = new Date().toISOString().slice(0, 10);
  const content = `---
category: "[[Albums]]"
tags:
  - music
  - albums
  - vinyls
color: "${color}"
artist:
${artists.map(a=>`  - "[[${a}]]"`).join('\n')}
title: "${title}"
year: ${year}
released: "${released}"
master_id: ${master_id}
genre:
${genres.map(g=>`  - "${g}"`).join('\n')}
styles:
${styles.map(s=>`  - "${s}"`).join('\n')}
rating: ${vinylRating || ''}
created: ${createdDate}
---

${coverUrl ? `![Album Cover|300](${coverUrl})\n` : ''}
## Tracklist
${tracklist || 'Not available.'}

---
## Notes from Discogs
${notes}
`;

  try {
    const refs = await getOrCreateFolder(vaultHandle, 'References');
    const vinylFolder = await getOrCreateFolder(refs, 'Vinyl');
    const musiciansFolder = await getOrCreateFolder(refs, 'Musicians');

    // Create musician stubs for any new artists
    for (const artist of artists) {
      const artistFilename = sanitize(artist) + '.md';
      try {
        await musiciansFolder.getFileHandle(artistFilename);
      } catch(e) {
        const stub = `---\ncategory: "[[Musicians]]"\ntags:\n  - artist\nname: "${artist}"\ncreated: ${createdDate}\n---\n\n# ${artist}\n`;
        await writeFile(musiciansFolder, artistFilename, stub);
      }
    }

    await writeFile(vinylFolder, filename, content);
    addRecent({ type: 'vinyl', title, sub: artists.join(', '), cover: coverUrl });
    showToast(`saved: ${title}`, 'success');
    resetVinylForm();
    await loadCollections();
  } catch(e) { showToast('save failed — check vault permissions', 'error'); }
}

function resetVinylForm() {
  document.getElementById('vArtist').value = '';
  document.getElementById('vTitle').value = '';
  document.getElementById('vColor').value = '';
  document.getElementById('vResults').innerHTML = '';
  document.getElementById('vConfirm').innerHTML = '';
  selectedVinyl = null; vinylRating = 0;
}

let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');

  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
